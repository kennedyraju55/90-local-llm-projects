  <text x="135" y="100" text-anchor="middle" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Git Integration</text>
  <text x="135" y="122" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Auto-pull commit history and branch info for </text>
  <text x="135" y="137" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">context</text>
  <rect x="270" y="40" width="230" height="125" rx="10" fill="#4361ee" fill-opacity="0.1" stroke="#4361ee" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="385" y="75" text-anchor="middle" fill="#4361ee" font-family="Segoe UI,Arial,sans-serif" font-size="22">◈</text>
  <text x="385" y="100" text-anchor="middle" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">4 Templates</text>
  <text x="385" y="122" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Daily standup, weekly summary, sprint review,</text>
  <text x="385" y="137" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10"> async update</text>
  <rect x="520" y="40" width="230" height="125" rx="10" fill="#4361ee" fill-opacity="0.1" stroke="#4361ee" stroke-opacity="0.4" stroke-width="1.5"/>
