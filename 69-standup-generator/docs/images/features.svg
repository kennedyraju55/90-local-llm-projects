  <text x="135" y="267" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Generate combined standups for multiple team </text>
  <text x="135" y="282" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">members</text>
  <rect x="270" y="185" width="230" height="125" rx="10" fill="#4361ee" fill-opacity="0.1" stroke="#4361ee" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="385" y="220" text-anchor="middle" fill="#4361ee" font-family="Segoe UI,Arial,sans-serif" font-size="22">⬡</text>
  <text x="385" y="245" text-anchor="middle" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Task Categorization</text>
  <text x="385" y="267" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Auto-sort tasks into completed, in-progress, </text>
  <text x="385" y="282" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">planned, blocked</text>
  <rect x="520" y="185" width="230" height="125" rx="10" fill="#4361ee" fill-opacity="0.1" stroke="#4361ee" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="635" y="220" text-anchor="middle" fill="#4361ee" font-family="Segoe UI,Arial,sans-serif" font-size="22">◎</text>
  <text x="635" y="245" text-anchor="middle" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Standup History</text>
  <text x="635" y="267" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Save and retrieve past standup reports with d</text>
  <text x="635" y="282" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">ate filtering</text>
