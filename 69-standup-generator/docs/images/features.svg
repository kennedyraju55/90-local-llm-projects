  <text x="635" y="100" text-anchor="middle" fill="white" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">JIRA Linking</text>
  <text x="635" y="122" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Auto-detect and link JIRA-style ticket refere</text>
  <text x="635" y="137" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">nces (PROJ-123)</text>
  <rect x="20" y="185" width="230" height="125" rx="10" fill="#4361ee" fill-opacity="0.1" stroke="#4361ee" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="135" y="220" text-anchor="middle" fill="#4361ee" font-family="Segoe UI,Arial,sans-serif" font-size="22">◉</text>
