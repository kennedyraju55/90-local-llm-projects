  </defs>
  <rect width="770" height="340" fill="url(#featbg)" rx="12"/>
  <text x="385" y="28" text-anchor="middle" fill="#a0a0b8" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="2">FEATURES</text>
  <rect x="20" y="40" width="230" height="125" rx="10" fill="#4361ee" fill-opacity="0.1" stroke="#4361ee" stroke-opacity="0.4" stroke-width="1.5"/>
