<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2ec4b6"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Input Row -->
  <rect x="30" y="60" width="120" height="45" rx="8" fill="#1a1e2e" stroke="#2ec4b6" stroke-width="1.5"/>
  <text x="90" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#2ec4b6" text-anchor="middle">📄 Trace File</text>
  <text x="90" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">--trace file.txt</text>
  
  <rect x="30" y="115" width="120" height="45" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📝 Text Input</text>
  <text x="90" y="151" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">--text "..."</text>

  <rect x="30" y="170" width="120" height="45" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">⌨️ Stdin</text>
  <text x="90" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">pipe input</text>

  <!-- Arrows to Language Detector -->
  <line x1="150" y1="82" x2="195" y2="140" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="137" x2="195" y2="140" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="192" x2="195" y2="140" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Language Detector -->
  <rect x="200" y="115" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="265" y="137" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🌐 Lang Detector</text>
  <text x="265" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Auto-detect language</text>

  <line x1="330" y1="140" x2="375" y2="140" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Error Type Extractor -->
  <rect x="380" y="115" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="445" y="137" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔍 Error Extractor</text>
  <text x="445" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Type + hint matching</text>

  <line x1="510" y1="140" x2="555" y2="140" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Prompt Builder -->
  <rect x="560" y="115" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="625" y="137" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔨 Prompt Builder</text>
  <text x="625" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Context + hints</text>

  <line x1="625" y1="165" x2="625" y2="210" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="540" y="215" width="170" height="60" rx="10" fill="#1a1e2e" stroke="#2ec4b6" stroke-width="2"/>
  <text x="625" y="242" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#2ec4b6" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="625" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Error Analysis Engine</text>

  <line x1="540" y1="245" x2="470" y2="245" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output Row -->
  <rect x="30" y="275" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#2ec4b6" stroke-width="1.5"/>
  <text x="105" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#2ec4b6" text-anchor="middle">📖 Explanation</text>
  <text x="105" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Root cause analysis</text>

  <rect x="200" y="275" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔧 Fix Code</text>
  <text x="275" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Generated fix</text>

  <rect x="370" y="275" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="445" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔗 Similar Errors</text>
  <text x="445" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Related patterns</text>

  <line x1="400" y1="260" x2="105" y2="275" stroke="#2ec4b6" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="265" x2="275" y2="275" stroke="#2ec4b6" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="430" y1="270" x2="445" y2="275" stroke="#2ec4b6" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="30" y="345" width="740" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local Processing • Multi-Language Support • Fix Code Generation</text>
</svg>
