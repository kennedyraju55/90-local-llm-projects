    <text x="20" y="75" fill="#50fa7b" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="13" font-weight="bold">$ python main.py --topic &#x27;Civil Rights&#x27;</text>
    <text x="20" y="103" fill="#8be9fd" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">🤖 Gemma 4 Response (313.2s):</text>
    <text x="20" y="125" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">Here are 5 key dates and events of the American Civil Rights Movement between 1954</text>
    <text x="20" y="143" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">and 1968:</text>
    <text x="20" y="161" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12"></text>
    <text x="20" y="179" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">1. **1954: *Brown v. Board of Education* Supreme Court Decision:** This landmark</text>
    <text x="20" y="197" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">ruling declared that state-sponsored segregation in public schools was</text>
    <text x="20" y="215" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">unconstitutional. While it didn&#x27;t immediately end segregation, it provided the</text>
    <text x="20" y="233" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">critical legal foundation that fueled the direct-action protests of the ensuing</text>
    <text x="20" y="251" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">decades.</text>
    <text x="20" y="269" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12"></text>
    <text x="20" y="287" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">2. **1955–1956: Montgomery Bus Boycott:** Sparked by Rosa Parks&#x27; refusal to give up</text>
    <text x="20" y="305" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">her bus seat, the boycott lasted for over a year. It was a monumental example of</text>
    <text x="20" y="323" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">nonviolent direct action, leading to a Supreme Court ruling that mandated the</text>
    <text x="20" y="341" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">desegregation of public buses in Montgomery, Alabama, and catapulting Martin Luther</text>
    <text x="20" y="359" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">King Jr. to national prominence.</text>
    <text x="20" y="377" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12"></text>
    <text x="20" y="395" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">3. **1960: Greensboro Sit-Ins:** Beginning when college students sat down at a</text>
    <text x="20" y="413" fill="#6272a4" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">  ... (truncated)</text>
