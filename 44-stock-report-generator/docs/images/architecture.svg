<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#ff6b35" stroke-opacity="0.1" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    Architecture Pipeline
  </text>
  <rect x="310" y="42" width="180" height="2" fill="url(#accentGrad)" rx="1" opacity="0.6"/>

  <!-- Row 1: Input Layer -->
  <!-- Box 1: Stock CSV -->
  <g transform="translate(30, 70)">
    <rect width="140" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="70" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">📄</text>
    <text x="70" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Stock CSV</text>
    <text x="70" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">load_stock_data()</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="172" y1="102" x2="198" y2="102" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Box 2: Price Detection -->
  <g transform="translate(200, 70)">
    <rect width="140" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="70" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">🔍</text>
    <text x="70" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Price Detection</text>
    <text x="70" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">_find_close_column()</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="342" y1="102" x2="368" y2="102" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Box 3: Metric Engine -->
  <g transform="translate(370, 70)">
    <rect width="140" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="70" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">⚙️</text>
    <text x="70" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Metric Engine</text>
    <text x="70" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">compute_metrics()</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="512" y1="102" x2="538" y2="102" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Box 4: Technical Indicators -->
  <g transform="translate(540, 70)">
    <rect width="230" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="115" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">📈</text>
    <text x="115" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Technical Indicators</text>
    <text x="115" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">RSI · Bollinger Bands · MACD</text>
  </g>

  <!-- Vertical Arrow from Indicators down -->
  <line x1="655" y1="137" x2="655" y2="168" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Row 2: Processing Layer -->
  <!-- Box 5: Risk Assessment -->
  <g transform="translate(540, 170)">
    <rect width="230" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="115" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">⚠️</text>
    <text x="115" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Risk Assessment</text>
    <text x="115" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">assess_risk() → score 0-100</text>
  </g>

  <!-- Arrow 5→6 (left) -->
  <line x1="538" y1="202" x2="512" y2="202" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Box 6: Multi-Ticker Comparison -->
  <g transform="translate(310, 170)">
    <rect width="200" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="100" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">🔄</text>
    <text x="100" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">Multi-Ticker Compare</text>
    <text x="100" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">compare_tickers()</text>
  </g>

  <!-- Arrow 6→7 (left) -->
  <line x1="308" y1="202" x2="282" y2="202" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Box 7: LLM Report -->
  <g transform="translate(100, 170)">
    <rect width="180" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="90" y="24" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">🤖</text>
    <text x="90" y="42" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ffffff">LLM Report Engine</text>
    <text x="90" y="56" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">generate_report() → Ollama</text>
  </g>

  <!-- Vertical Arrow from LLM down -->
  <line x1="190" y1="237" x2="190" y2="268" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Row 3: Output Layer -->
  <!-- Box 8: Rich Output -->
  <g transform="translate(30, 270)">
    <rect width="740" height="65" fill="url(#boxGrad)" rx="8" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="370" y="25" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff6b35">🖥️</text>
    <text x="370" y="44" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff">Rich Terminal Output &amp; Streamlit Web Dashboard</text>
    <text x="370" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">Color-coded tables · Risk meters · Interactive charts · Narrative panels</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 355)">
    <rect x="0" y="0" width="740" height="30" fill="#21262d" fill-opacity="0.5" rx="6"/>
    <text x="20" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Pipeline:</text>
    <text x="75" y="19" font-family="monospace" font-size="10" fill="#ff6b35">CSV Input</text>
    <text x="140" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="155" y="19" font-family="monospace" font-size="10" fill="#ff6b35">Detection</text>
    <text x="225" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="240" y="19" font-family="monospace" font-size="10" fill="#ff6b35">Metrics</text>
    <text x="300" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="315" y="19" font-family="monospace" font-size="10" fill="#ff6b35">RSI/BB/MACD</text>
    <text x="410" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="425" y="19" font-family="monospace" font-size="10" fill="#ff6b35">Risk</text>
    <text x="460" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="475" y="19" font-family="monospace" font-size="10" fill="#ff6b35">Compare</text>
    <text x="540" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="555" y="19" font-family="monospace" font-size="10" fill="#ff6b35">LLM Report</text>
    <text x="635" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">→</text>
    <text x="650" y="19" font-family="monospace" font-size="10" fill="#ff6b35">Rich Output</text>
  </g>
</svg>
