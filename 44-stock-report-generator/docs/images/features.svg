<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="798" height="348" fill="none" stroke="#ff6b35" stroke-opacity="0.1" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    Core Features
  </text>
  <rect x="335" y="42" width="130" height="2" fill="url(#accentGrad)" rx="1" opacity="0.6"/>

  <!-- Row 1 -->
  <!-- Card 1: Smart Price Detection -->
  <g transform="translate(30, 60)">
    <rect width="235" height="110" fill="url(#cardGrad)" rx="10" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="3" fill="#ff6b35" rx="10" opacity="0.7"/>
    <text x="20" y="38" font-family="monospace" font-size="24">🔍</text>
    <text x="55" y="38" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">Smart Price Detection</text>
    <text x="20" y="58" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Auto-detect close price columns from</text>
    <text x="20" y="72" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">any CSV format. Handles "Close",</text>
    <text x="20" y="86" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">"Adj Close", "close_price" and more.</text>
    <rect x="20" y="94" width="60" height="6" fill="#ff6b35" fill-opacity="0.3" rx="3"/>
  </g>

  <!-- Card 2: Technical Indicators -->
  <g transform="translate(282, 60)">
    <rect width="235" height="110" fill="url(#cardGrad)" rx="10" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="3" fill="#ff6b35" rx="10" opacity="0.7"/>
    <text x="20" y="38" font-family="monospace" font-size="24">📈</text>
    <text x="55" y="38" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">Technical Indicators</text>
    <text x="20" y="58" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">RSI (14-period), Bollinger Bands</text>
    <text x="20" y="72" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">(20-period), and MACD with signal</text>
    <text x="20" y="86" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">line crossover interpretation.</text>
    <g transform="translate(20, 94)">
      <rect width="35" height="6" fill="#ff6b35" fill-opacity="0.5" rx="3"/>
      <rect x="40" width="35" height="6" fill="#ff6b35" fill-opacity="0.35" rx="3"/>
      <rect x="80" width="35" height="6" fill="#ff6b35" fill-opacity="0.2" rx="3"/>
    </g>
  </g>

  <!-- Card 3: Risk Assessment Engine -->
  <g transform="translate(534, 60)">
    <rect width="235" height="110" fill="url(#cardGrad)" rx="10" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="3" fill="#ff6b35" rx="10" opacity="0.7"/>
    <text x="20" y="38" font-family="monospace" font-size="24">⚠️</text>
    <text x="55" y="38" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">Risk Assessment Engine</text>
    <text x="20" y="58" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Composite risk score (0-100) based</text>
    <text x="20" y="72" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">on volatility, price movement, RSI</text>
    <text x="20" y="86" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">extremes, and down-day ratio analysis.</text>
    <!-- Mini risk meter -->
    <rect x="20" y="94" width="120" height="6" fill="#21262d" rx="3"/>
    <rect x="20" y="94" width="72" height="6" fill="#ff6b35" rx="3"/>
  </g>

  <!-- Row 2 -->
  <!-- Card 4: Multi-Ticker Comparison -->
  <g transform="translate(30, 190)">
    <rect width="235" height="110" fill="url(#cardGrad)" rx="10" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="3" fill="#ff6b35" rx="10" opacity="0.7"/>
    <text x="20" y="38" font-family="monospace" font-size="24">🔄</text>
    <text x="55" y="38" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">Multi-Ticker Comparison</text>
    <text x="20" y="58" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Compare multiple stocks side by side.</text>
    <text x="20" y="72" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Analyze metrics, indicators, and risk</text>
    <text x="20" y="86" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">across your entire portfolio at once.</text>
    <!-- Mini comparison bars -->
    <g transform="translate(20, 94)">
      <rect width="80" height="3" fill="#ff6b35" rx="1.5"/>
      <rect y="5" width="60" height="3" fill="#ff9f1c" rx="1.5"/>
    </g>
  </g>

  <!-- Card 5: SMA & Volatility Analysis -->
  <g transform="translate(282, 190)">
    <rect width="235" height="110" fill="url(#cardGrad)" rx="10" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="3" fill="#ff6b35" rx="10" opacity="0.7"/>
    <text x="20" y="38" font-family="monospace" font-size="24">📊</text>
    <text x="55" y="38" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">SMA &amp; Volatility Analysis</text>
    <text x="20" y="58" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">5-day and 20-day Simple Moving</text>
    <text x="20" y="72" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Averages with volatility tracking,</text>
    <text x="20" y="86" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">daily returns, and up/down day counts.</text>
    <!-- Mini SMA lines -->
    <g transform="translate(20, 90)">
      <polyline points="0,12 15,8 30,10 45,6 60,7 75,3 90,5" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <polyline points="0,14 15,12 30,11 45,10 60,9 75,7 90,6" fill="none" stroke="#ff9f1c" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Card 6: AI Narrative Reports -->
  <g transform="translate(534, 190)">
    <rect width="235" height="110" fill="url(#cardGrad)" rx="10" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="3" fill="#ff6b35" rx="10" opacity="0.7"/>
    <text x="20" y="38" font-family="monospace" font-size="24">🤖</text>
    <text x="55" y="38" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">AI Narrative Reports</text>
    <text x="20" y="58" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">LLM-powered narrative analysis via</text>
    <text x="20" y="72" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Ollama. Professional-grade reports</text>
    <text x="20" y="86" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">with market outlook and recommendations.</text>
    <!-- Mini text lines -->
    <g transform="translate(20, 94)">
      <rect width="100" height="2" fill="#8b949e" fill-opacity="0.3" rx="1"/>
      <rect y="5" width="80" height="2" fill="#8b949e" fill-opacity="0.2" rx="1"/>
      <rect y="10" width="90" height="2" fill="#8b949e" fill-opacity="0.15" rx="1"/>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="30" y="320" width="740" height="2" fill="url(#accentGrad)" rx="1" opacity="0.2"/>
  <text x="400" y="340" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58">
    100% Local Processing · Your Data Never Leaves Your Machine
  </text>
</svg>
