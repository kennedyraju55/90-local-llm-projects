<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" rx="10" fill="#282a36"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#1e1f29"/>
  <rect y="20" width="800" height="12" fill="#1e1f29"/>

  <!-- macOS window dots -->
  <circle cx="20" cy="16" r="6" fill="#ff5555"/>
  <circle cx="40" cy="16" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="16" r="6" fill="#50fa7b"/>

  <!-- Title bar text -->
  <text x="85" y="20" fill="#bd93f9" font-family="'Cascadia Code',Consolas,monospace" font-size="13" font-weight="bold">  Password Strength Advisor — Project #74</text>

  <!-- Terminal content -->
  <text x="20" y="60" fill="#50fa7b" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">$ python -m password_advisor analyze</text>
  <text x="20" y="76" fill="#8be9fd" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">🤖 Model: gemma4:latest | Ollama @ localhost:11434</text>
  <text x="20" y="92" fill="#6272a4" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">──────────────────────────────────────────────────────────────────────</text>
  <text x="20" y="108" fill="#8be9fd" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">📋 Prompt: Rate password MyP@ss2024! strength. One paragraph....</text>
  <text x="20" y="124" fill="#6272a4" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">──────────────────────────────────────────────────────────────────────</text>
  <text x="20" y="140" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12"></text>
  <text x="20" y="156" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">This password, &quot;MyP@ss2024!&quot;, rates as **Strong**, primarily due to its substantial</text>
  <text x="20" y="172" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">length (13 characters) and high complexity, as it successfully incorporates a mixture</text>
  <text x="20" y="188" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">of uppercase letters (M, P), lowercase letters, numbers (2024), and symbols (@, !).</text>
  <text x="20" y="204" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">This variety of character types significantly increases the number of possible</text>
  <text x="20" y="220" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">combinations, making it resistant to simple dictionary attacks. However, it is not</text>
  <text x="20" y="236" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">perfect; the inclusion of the common root word &quot;Pass&quot; and the predictable year &quot;2024&quot;</text>
  <text x="20" y="252" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">slightly lowers its overall entropy, as an attacker might guess similar patterns</text>
  <text x="20" y="268" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">related to the current date or common concepts. To achieve maximum strength, you</text>
  <text x="20" y="284" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">should retain the length and variety but replace easily guessed components—like</text>
  <text x="20" y="300" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">personal years or common words—with something completely random and unrelated to your</text>
  <text x="20" y="316" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace" font-size="12">life.</text>

  <!-- Bottom status bar -->
  <rect y="478" width="800" height="22" rx="0" fill="#1e1f29"/>
  <text x="20" y="493" fill="#6272a4" font-family="Consolas,monospace" font-size="10">gemma4:latest • Ollama • localhost:11434 • 74-password-strength-advisor</text>
</svg>