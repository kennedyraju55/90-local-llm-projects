<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <!-- Card 1 -->
  <rect x="20" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#ff6b35" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="20" width="240" height="4" rx="2" fill="#ff6b35"/>
  <text x="140" y="60" text-anchor="middle" font-size="28">🔢</text>
  <text x="140" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Entropy Calculator</text>
    <text x="140" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Shannon entropy with</text>
    <text x="140" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">pattern penalty scoring</text>

  <!-- Card 2 -->
  <rect x="280" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#ff6b35" stroke-width="1.5" opacity="0.95"/>
