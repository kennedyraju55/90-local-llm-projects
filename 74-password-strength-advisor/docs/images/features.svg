    <text x="400" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Local dictionary + leet</text>
    <text x="400" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">speak variation checks</text>

  <!-- Card 3 -->
  <rect x="540" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#ff6b35" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="20" width="240" height="4" rx="2" fill="#ff6b35"/>
  <text x="660" y="60" text-anchor="middle" font-size="28">📋</text>
  <text x="660" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">NIST Policy</text>
    <text x="660" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">SP 800-63B compliant</text>
    <text x="660" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">policy generation</text>

  <!-- Card 4 -->
  <rect x="20" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#ff6b35" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="185" width="240" height="4" rx="2" fill="#ff6b35"/>
  <text x="140" y="225" text-anchor="middle" font-size="28">🎲</text>
  <text x="140" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Password Generator</text>
