  <!-- Card 6 -->
  <rect x="540" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#ff6b35" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="185" width="240" height="4" rx="2" fill="#ff6b35"/>
  <text x="660" y="225" text-anchor="middle" font-size="28">🤖</text>
  <text x="660" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">AI Analysis</text>
    <text x="660" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">LLM-powered deep analysis</text>
    <text x="660" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">with masked characteristics</text>

