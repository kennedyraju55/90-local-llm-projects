<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e1f0a"/>
      <stop offset="100%" style="stop-color:#3d2a10"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb8500"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#fb8500" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">System Architecture</text>

  <!-- Pet Profile -->
  <rect x="30" y="55" width="150" height="80" rx="10" fill="#1e293b" stroke="#fb8500" stroke-width="2"/>
  <text x="105" y="78" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🐾 Pet Profile</text>
  <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">8 Pet Types</text>
  <text x="105" y="110" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Name • Breed • Age</text>
  <text x="105" y="125" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Weight • History</text>

  <line x1="180" y1="95" x2="220" y2="95" stroke="#fb8500" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Health Engine -->
  <rect x="225" y="45" width="180" height="100" rx="10" fill="#1e293b" stroke="#fb8500" stroke-width="2"/>
  <text x="315" y="70" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🩺 Health Engine</text>
  <text x="315" y="88" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_response() • check_symptoms()</text>
  <text x="315" y="103" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_breed_advice()</text>
  <text x="315" y="118" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_nutrition_advice()</text>
  <text x="315" y="133" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Urgency Assessment</text>

  <line x1="405" y1="95" x2="445" y2="95" stroke="#fb8500" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="450" y="60" width="155" height="70" rx="10" fill="#e8720c" stroke="#fb8500" stroke-width="2"/>
  <text x="527" y="87" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🤖 Gemma 4</text>
  <text x="527" y="107" text-anchor="middle" fill="#fff3e0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Ollama Local LLM</text>

  <!-- Symptom Tracker -->
  <rect x="30" y="180" width="150" height="60" rx="10" fill="#1e293b" stroke="#e8720c" stroke-width="2"/>
  <text x="105" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📋 Symptom Tracker</text>
  <text x="105" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">record/get_symptom_history()</text>

  <!-- Emergency -->
  <rect x="225" y="180" width="180" height="60" rx="10" fill="#1e293b" stroke="#e63946" stroke-width="2"/>
  <text x="315" y="205" text-anchor="middle" fill="#e63946" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🚨 Emergency Flags</text>
  <text x="315" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Breathing • Seizures • Poisoning</text>

  <!-- Disclaimer -->
  <rect x="450" y="180" width="155" height="60" rx="10" fill="#1e293b" stroke="#e8720c" stroke-width="2"/>
  <text x="527" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">⚕️ Medical Safety</text>
  <text x="527" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Disclaimer • No Rx</text>

  <!-- Storage -->
  <rect x="645" y="140" width="130" height="100" rx="10" fill="#1e293b" stroke="#fb8500" stroke-width="2"/>
  <text x="710" y="165" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💾 Storage</text>
  <text x="710" y="185" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">pet_profiles.json</text>
  <text x="710" y="201" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">symptom_history.json</text>
  <text x="710" y="217" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">max 500 entries</text>

  <!-- Interfaces -->
  <rect x="30" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#fb8500" stroke-width="2"/>
  <text x="145" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🖥️ CLI (Multi-command)</text>
  <text x="145" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">chat-cmd [--pet-type] [--name] [--breed]</text>
  <text x="145" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">/symptoms /breed /nutrition /history</text>

  <rect x="300" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#fb8500" stroke-width="2"/>
  <text x="415" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🌐 Web UI (3 Tabs)</text>
  <text x="415" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Chat | Symptom Check | History</text>
  <text x="415" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Breed Advice • Nutrition • Urgency</text>

  <text x="400" y="385" text-anchor="middle" fill="#4a5568" font-family="Segoe UI,Arial,sans-serif" font-size="11">Veterinary Advisor Bot — 8 Pet Types • Symptom Analysis • Emergency Flags • Medical Safety</text>
</svg>
