  <text x="145" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#cdd6f4">Clause Analysis</text>
  <text x="145" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">Risk, obligations,</text>
  <text x="145" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">deadlines &amp; red flags</text>

  <rect x="285" y="60" width="230" height="120" rx="10" fill="#1e1e2e" stroke="#d4a574" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" font-family="Arial" font-size="24" fill="#d4a574">🔍</text>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#cdd6f4">Clause Comparison</text>
  <text x="400" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">Compare terms,</text>
  <text x="400" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">find negotiation points</text>

  <rect x="540" y="60" width="230" height="120" rx="10" fill="#1e1e2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="655" y="90" text-anchor="middle" font-family="Arial" font-size="24" fill="#4ade80">📄</text>
  <text x="655" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#cdd6f4">Full Contract Review</text>
  <text x="655" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">Complete document</text>
  <text x="655" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">analysis &amp; scoring</text>

  <rect x="30" y="200" width="230" height="120" rx="10" fill="#1e1e2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="145" y="230" text-anchor="middle" font-family="Arial" font-size="24" fill="#f59e0b">🚩</text>
  <text x="145" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#cdd6f4">Red Flag Detection</text>
  <text x="145" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">Identify problematic</text>
  <text x="145" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">&amp; unusual terms</text>

  <rect x="285" y="200" width="230" height="120" rx="10" fill="#1e1e2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="24" fill="#ef4444">🔒</text>
  <text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#cdd6f4">100% Private</text>
  <text x="400" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">Local LLM processing</text>
  <text x="400" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#a0a0b0">Attorney-client privilege</text>

  <rect x="540" y="200" width="230" height="120" rx="10" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1.5"/>
