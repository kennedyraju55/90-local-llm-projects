app:
  name: "Contract Clause Analyzer"
  version: "1.0.0"
llm:
  model: "gemma4:latest"
  temperature: 0.3
  max_tokens: 4096
  ollama_host: "http://localhost:11434"
analysis:
  default_risk_threshold: "medium"
  max_clause_length: 10000
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
