<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold">Architecture Overview</text>

  <!-- User Layer -->
  <rect x="280" y="60" width="240" height="50" rx="10" fill="#313244" stroke="#667eea" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="16">👤 User</text>

  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="130" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Interface Layer -->
  <rect x="50" y="135" width="200" height="50" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="150" y="165" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="14">🖥️ Streamlit Web UI</text>

  <rect x="300" y="135" width="200" height="50" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="14">⌨️ CLI (Click + Rich)</text>

  <rect x="550" y="135" width="200" height="50" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="650" y="165" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="14">🔌 FastAPI REST API</text>

  <!-- Arrow down -->
  <line x1="400" y1="185" x2="400" y2="210" stroke="#667eea" stroke-width="2"/>

  <!-- Core Layer -->
  <rect x="180" y="215" width="440" height="55" rx="10" fill="#1e1e2e" stroke="url(#accent)" stroke-width="2"/>
  <text x="400" y="240" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold">🧠 Core Engine</text>
  <text x="400" y="260" text-anchor="middle" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="12">interpret_results • identify_abnormalities • suggest_followup • explain_lab_value</text>

  <!-- Arrow down -->
  <line x1="400" y1="270" x2="400" y2="295" stroke="#667eea" stroke-width="2"/>

  <!-- LLM Layer -->
  <rect x="200" y="300" width="180" height="50" rx="10" fill="#313244" stroke="#f38ba8" stroke-width="2"/>
  <text x="290" y="330" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="14">🤖 Common LLM Client</text>

  <rect x="420" y="300" width="180" height="50" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <text x="510" y="330" text-anchor="middle" fill="#cdd6f4" font-family="Segoe UI, Arial, sans-serif" font-size="14">📊 Reference Ranges</text>

  <!-- Ollama -->
  <rect x="200" y="365" width="180" height="30" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="1"/>
  <text x="290" y="385" text-anchor="middle" fill="#a6adc8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Ollama + Gemma 4 (Local)</text>
</svg>
