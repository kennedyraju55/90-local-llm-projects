<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b5179e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#f72585;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#b5179e;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12" ry="12"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#f72585">
    <circle cx="30" cy="30" r="1.5"/><circle cx="60" cy="30" r="1.5"/><circle cx="90" cy="30" r="1.5"/><circle cx="120" cy="30" r="1.5"/><circle cx="150" cy="30" r="1.5"/>
    <circle cx="30" cy="60" r="1.5"/><circle cx="60" cy="60" r="1.5"/><circle cx="90" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="150" cy="60" r="1.5"/>
    <circle cx="30" cy="90" r="1.5"/><circle cx="60" cy="90" r="1.5"/><circle cx="90" cy="90" r="1.5"/><circle cx="120" cy="90" r="1.5"/><circle cx="150" cy="90" r="1.5"/>
    <circle cx="650" cy="110" r="1.5"/><circle cx="680" cy="110" r="1.5"/><circle cx="710" cy="110" r="1.5"/><circle cx="740" cy="110" r="1.5"/><circle cx="770" cy="110" r="1.5"/>
    <circle cx="650" cy="140" r="1.5"/><circle cx="680" cy="140" r="1.5"/><circle cx="710" cy="140" r="1.5"/><circle cx="740" cy="140" r="1.5"/><circle cx="770" cy="140" r="1.5"/>
    <circle cx="650" cy="170" r="1.5"/><circle cx="680" cy="170" r="1.5"/><circle cx="710" cy="170" r="1.5"/><circle cx="740" cy="170" r="1.5"/><circle cx="770" cy="170" r="1.5"/>
  </g>

  <!-- Trend line decoration (left side) -->
  <g filter="url(#softGlow)">
    <polyline points="40,150 80,130 120,140 160,105 200,115 240,85 280,95 320,60"
              fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <circle cx="160" cy="105" r="4" fill="#f72585" opacity="0.7"/>
    <circle cx="240" cy="85" r="4" fill="#f72585" opacity="0.7"/>
    <circle cx="320" cy="60" r="4" fill="#f72585" opacity="0.9"/>
  </g>

  <!-- Bar chart decoration (right side) -->
  <g opacity="0.25">
    <rect x="600" y="100" width="18" height="55" rx="3" fill="#f72585"/>
    <rect x="625" y="80" width="18" height="75" rx="3" fill="#f72585"/>
    <rect x="650" y="110" width="18" height="45" rx="3" fill="#b5179e"/>
    <rect x="675" y="65" width="18" height="90" rx="3" fill="#f72585"/>
    <rect x="700" y="90" width="18" height="65" rx="3" fill="#b5179e"/>
    <rect x="725" y="50" width="18" height="105" rx="3" fill="#f72585"/>
    <rect x="750" y="75" width="18" height="80" rx="3" fill="#b5179e"/>
  </g>

  <!-- Accent line separator -->
  <rect x="200" y="120" width="400" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- Title -->
  <text x="400" y="82" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" filter="url(#glow)">
    📈 Trend Analysis Tool
  </text>

  <!-- Tagline -->
  <text x="400" y="150" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e" letter-spacing="1.5">
    AI-Powered Topic Discovery &amp; Trend Intelligence
  </text>

  <!-- Version badge -->
  <g transform="translate(660, 18)">
    <rect width="55" height="22" rx="11" fill="#f72585" opacity="0.2"/>
    <text x="27.5" y="15" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="11" fill="#f72585" font-weight="600">v1.0.0</text>
  </g>

  <!-- Border glow -->
  <rect width="800" height="200" fill="none" stroke="#f72585" stroke-width="1" rx="12" ry="12" opacity="0.15"/>
</svg>
