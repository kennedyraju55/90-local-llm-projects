<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bgGrad)" rx="12" ry="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f72585">Core Features</text>

  <!-- ===== ROW 1 ===== -->

  <!-- Card 1: Topic Extraction -->
  <g filter="url(#shadow)" transform="translate(25, 55)">
    <rect width="240" height="115" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="240" height="3" rx="1.5" fill="#f72585" y="0"/>
    <text x="120" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" filter="url(#iconGlow)" fill="#f72585">🔍</text>
    <text x="120" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Topic Extraction</text>
    <text x="120" y="76" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">LLM-powered topic discovery with</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">frequency ranks &amp; trend labels</text>
    <g transform="translate(45, 96)">
      <rect width="42" height="14" rx="7" fill="#f72585" opacity="0.2"/>
      <text x="21" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">high</text>
      <rect x="48" width="52" height="14" rx="7" fill="#f72585" opacity="0.15"/>
      <text x="74" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">medium</text>
      <rect x="106" width="42" height="14" rx="7" fill="#f72585" opacity="0.1"/>
      <text x="127" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">low</text>
    </g>
  </g>

  <!-- Card 2: Sentiment Trend Analysis -->
  <g filter="url(#shadow)" transform="translate(280, 55)">
    <rect width="240" height="115" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="240" height="3" rx="1.5" fill="#b5179e" y="0"/>
    <text x="120" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" filter="url(#iconGlow)" fill="#f72585">💭</text>
    <text x="120" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Sentiment Trend Analysis</text>
    <text x="120" y="76" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Document-level sentiment with</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">distribution tracking &amp; shift detection</text>
    <g transform="translate(35, 96)">
      <text x="0" y="11" font-family="'Segoe UI', sans-serif" font-size="9" fill="#3fb950">😊 Positive</text>
      <text x="65" y="11" font-family="'Segoe UI', sans-serif" font-size="9" fill="#f85149">😞 Negative</text>
      <text x="135" y="11" font-family="'Segoe UI', sans-serif" font-size="9" fill="#d29922">😐 Neutral</text>
    </g>
  </g>

  <!-- Card 3: Topic Evolution Tracking -->
  <g filter="url(#shadow)" transform="translate(535, 55)">
    <rect width="240" height="115" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="240" height="3" rx="1.5" fill="#7209b7" y="0"/>
    <text x="120" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" filter="url(#iconGlow)" fill="#f72585">📊</text>
    <text x="120" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Topic Evolution Tracking</text>
    <text x="120" y="76" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Track how topics evolve across</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">analysis runs over time</text>
    <g transform="translate(40, 96)">
      <text x="0" y="11" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">new → evolved → disappeared</text>
    </g>
  </g>

  <!-- ===== ROW 2 ===== -->

  <!-- Card 4: Emerging Topic Detection -->
  <g filter="url(#shadow)" transform="translate(25, 190)">
    <rect width="240" height="115" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="240" height="3" rx="1.5" fill="#f72585" y="0"/>
    <text x="120" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" filter="url(#iconGlow)" fill="#f72585">🚨</text>
    <text x="120" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Emerging Topic Detection</text>
    <text x="120" y="76" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Configurable threshold scoring</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">for new &amp; trending topics</text>
    <g transform="translate(55, 96)">
      <rect width="130" height="14" rx="7" fill="#f72585" opacity="0.15"/>
      <text x="65" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">threshold: 0.7 default</text>
    </g>
  </g>

  <!-- Card 5: Sentiment-Topic Correlation -->
  <g filter="url(#shadow)" transform="translate(280, 190)">
    <rect width="240" height="115" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="240" height="3" rx="1.5" fill="#b5179e" y="0"/>
    <text x="120" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" filter="url(#iconGlow)" fill="#f72585">🔗</text>
    <text x="120" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Sentiment-Topic Correlation</text>
    <text x="120" y="76" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Auto-correlate sentiment with</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">specific topics &amp; themes</text>
    <g transform="translate(40, 96)">
      <text x="0" y="11" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e">topic ↔ positive / negative / neutral</text>
    </g>
  </g>

  <!-- Card 6: Scheduled Reporting -->
  <g filter="url(#shadow)" transform="translate(535, 190)">
    <rect width="240" height="115" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="240" height="3" rx="1.5" fill="#7209b7" y="0"/>
    <text x="120" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" filter="url(#iconGlow)" fill="#f72585">📅</text>
    <text x="120" y="58" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Scheduled Reporting</text>
    <text x="120" y="76" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">Daily, weekly, or monthly</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e">automated report scheduling</text>
    <g transform="translate(25, 96)">
      <rect width="55" height="14" rx="7" fill="#f72585" opacity="0.15"/>
      <text x="27.5" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">daily</text>
      <rect x="60" width="60" height="14" rx="7" fill="#f72585" opacity="0.2"/>
      <text x="90" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">weekly</text>
      <rect x="125" width="62" height="14" rx="7" fill="#f72585" opacity="0.15"/>
      <text x="156" y="10.5" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="8" fill="#f72585">monthly</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="200" y="325" width="400" height="2" rx="1" fill="#f72585" opacity="0.2"/>

  <!-- Footer text -->
  <text x="400" y="342" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#484f58">All features powered by local LLM via Ollama — your data never leaves your machine</text>

  <!-- Border -->
  <rect width="800" height="350" fill="none" stroke="#f72585" stroke-width="1" rx="12" ry="12" opacity="0.12"/>
</svg>
