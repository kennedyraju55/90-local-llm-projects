<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7209b7"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#7209b7" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">System Architecture</text>

  <!-- User Input -->
  <rect x="30" y="55" width="150" height="80" rx="10" fill="#1e293b" stroke="#7209b7" stroke-width="2"/>
  <text x="105" y="78" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">👤 Travel Input</text>
  <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Destination(s) • Days</text>
  <text x="105" y="110" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Budget Tier • Interests</text>
  <text x="105" y="125" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Travelers (1-20)</text>

  <line x1="180" y1="95" x2="220" y2="95" stroke="#7209b7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Itinerary Engine -->
  <rect x="225" y="45" width="180" height="100" rx="10" fill="#1e293b" stroke="#7209b7" stroke-width="2"/>
  <text x="315" y="70" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🗺️ Itinerary Engine</text>
  <text x="315" y="88" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_itinerary()</text>
  <text x="315" y="103" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_multi_destination()</text>
  <text x="315" y="118" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_place_details()</text>
  <text x="315" y="133" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Day-by-day planning</text>

  <line x1="405" y1="95" x2="445" y2="95" stroke="#7209b7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="450" y="60" width="155" height="70" rx="10" fill="#560bad" stroke="#7209b7" stroke-width="2"/>
  <text x="527" y="87" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🤖 Gemma 4</text>
  <text x="527" y="107" text-anchor="middle" fill="#e9d5ff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Ollama Local LLM</text>

  <!-- Budget Breakdown -->
  <rect x="30" y="180" width="150" height="60" rx="10" fill="#1e293b" stroke="#560bad" stroke-width="2"/>
  <text x="105" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💰 Budget Planner</text>
  <text x="105" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_budget_breakdown()</text>

  <!-- Packing List -->
  <rect x="225" y="180" width="180" height="60" rx="10" fill="#1e293b" stroke="#560bad" stroke-width="2"/>
  <text x="315" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🎒 Packing List</text>
  <text x="315" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_packing_list()</text>

  <!-- Multi-Dest -->
  <rect x="450" y="180" width="155" height="60" rx="10" fill="#1e293b" stroke="#560bad" stroke-width="2"/>
  <text x="527" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🌐 Multi-Destination</text>
  <text x="527" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Chain multiple cities</text>

  <!-- Storage -->
  <rect x="645" y="140" width="130" height="100" rx="10" fill="#1e293b" stroke="#7209b7" stroke-width="2"/>
  <text x="710" y="168" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💾 Storage</text>
  <text x="710" y="188" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">saved_itineraries.json</text>
  <text x="710" y="204" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">save_itinerary()</text>
  <text x="710" y="220" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">parse_budget_items()</text>

  <!-- Interfaces -->
  <rect x="30" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#7209b7" stroke-width="2"/>
  <text x="145" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🖥️ CLI Interface</text>
  <text x="145" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">--destination --days --budget --interests --travelers</text>
  <text x="145" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Interactive: place | budget | pack</text>

  <rect x="300" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#7209b7" stroke-width="2"/>
  <text x="415" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🌐 Web UI (4 Tabs)</text>
  <text x="415" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Itinerary | Budget | Packing | Places</text>
  <text x="415" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Charts • Multi-destination support</text>

  <text x="400" y="385" text-anchor="middle" fill="#4a5568" font-family="Segoe UI,Arial,sans-serif" font-size="11">Travel Itinerary Bot — Multi-Destination • 3 Budget Tiers • Packing Lists • Budget Analytics</text>
</svg>
