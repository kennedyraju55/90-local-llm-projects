  <text x="140" y="225" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="28">📍</text>
  <text x="140" y="250" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Place Details</text>
  <text x="140" y="270" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Deep-dive into attractions,</text>
  <text x="140" y="285" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">restaurants, and landmarks</text>

  <rect x="280" y="195" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="225" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="28">📅</text>
  <text x="400" y="250" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Day-by-Day Plans</text>
  <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Detailed daily schedules with</text>
  <text x="400" y="285" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">morning, afternoon, evening</text>

  <rect x="540" y="195" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="660" y="225" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="28">👥</text>
  <text x="660" y="250" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Group Travel</text>
  <text x="660" y="270" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Support for 1-20 travelers</text>
