  <text x="660" y="130" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Smart packing suggestions</text>
  <text x="660" y="145" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">based on destination + activities</text>

