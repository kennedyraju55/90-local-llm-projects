  <text x="400" y="130" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Budget, Moderate, or Luxury</text>
  <text x="400" y="145" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">tiers with cost breakdowns</text>

