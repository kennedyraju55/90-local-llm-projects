<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="#0d1117"/>
  <rect y="12" width="800" height="24" fill="#0d1117"/>
  <circle cx="20" cy="18" r="7" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="7" fill="#ffbd2e"/>
  <circle cx="64" cy="18" r="7" fill="#27c93f"/>
  <text x="400" y="22" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">🔄 Code Translator — Terminal</text>

  <!-- Command prompt -->
  <text x="30" y="100" fill="#27c93f" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13" font-weight="bold">$ python -m code_translator translate --from python --to javascript</text>

  <!-- LLM Output -->
    <text x="30" y="130" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">Translation: Python -&gt; JavaScript</text>
    <text x="30" y="148" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13"></text>
    <text x="30" y="166" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  // Original (Python):</text>
    <text x="30" y="184" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  // def fibonacci(n):</text>
    <text x="30" y="202" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  //     if n &lt;= 1: return n</text>
    <text x="30" y="220" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  //     return fibonacci(n-1) + fibonacci(n-2)</text>
    <text x="30" y="238" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13"></text>
    <text x="30" y="256" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  // Translated (JavaScript):</text>
    <text x="30" y="274" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  function fibonacci(n) {</text>
    <text x="30" y="292" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">      if (n &lt;= 1) return n;</text>
    <text x="30" y="310" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">      return fibonacci(n - 1) + fibonacci(n - 2);</text>
    <text x="30" y="328" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  }</text>
    <text x="30" y="346" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13"></text>
    <text x="30" y="364" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">  console.log(fibonacci(10)); // Output: 55</text>
    <text x="30" y="382" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13"></text>
    <text x="30" y="400" fill="#e0e0e0" font-family="Cascadia Code, Fira Code, JetBrains Mono, monospace" font-size="13">Translation confidence: 99% | Verified: syntax OK</text>

  <!-- Footer -->
  <line x1="30" y1="433" x2="770" y2="433" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="453" fill="#6e7681" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">Powered by Gemma 4 via Ollama &#xb7; Local LLM &#xb7; No data leaves your machine</text>
</svg>