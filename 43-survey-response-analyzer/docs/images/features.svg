<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="featBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151c28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="featAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a9e93;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#featBg)" rx="12" />

  <!-- Title -->
  <text x="400" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Core Features
  </text>
  <rect x="330" y="42" width="140" height="2" rx="1" fill="#2ec4b6" opacity="0.6"/>

  <!-- ========== ROW 1 ========== -->

  <!-- Card 1: Smart Column Detection -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="60" width="230" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="60" width="230" height="4" rx="2" fill="#2ec4b6" opacity="0.8"/>
    <circle cx="60" cy="95" r="16" fill="#2ec4b6" opacity="0.12"/>
    <text x="60" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2ec4b6" text-anchor="middle">🔍</text>
    <text x="85" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">Smart Column Detection</text>
    <text x="45" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan x="45" dy="0">Auto-detect text vs categorical</tspan>
      <tspan x="45" dy="16">columns using heuristics like avg</tspan>
      <tspan x="45" dy="16">length and keyword matching.</tspan>
    </text>
  </g>

  <!-- Card 2: Theme Extraction -->
  <g filter="url(#cardShadow)">
    <rect x="285" y="60" width="230" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="285" y="60" width="230" height="4" rx="2" fill="#2ec4b6" opacity="0.8"/>
    <circle cx="315" cy="95" r="16" fill="#2ec4b6" opacity="0.12"/>
    <text x="315" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2ec4b6" text-anchor="middle">🎯</text>
    <text x="340" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">Theme Extraction</text>
    <text x="300" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan x="300" dy="0">LLM-powered theme discovery</tspan>
      <tspan x="300" dy="16">with counts, sentiment labels,</tspan>
      <tspan x="300" dy="16">and representative quotes.</tspan>
    </text>
  </g>

  <!-- Card 3: Theme Clustering -->
  <g filter="url(#cardShadow)">
    <rect x="540" y="60" width="230" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="540" y="60" width="230" height="4" rx="2" fill="#2ec4b6" opacity="0.8"/>
    <circle cx="570" cy="95" r="16" fill="#2ec4b6" opacity="0.12"/>
    <text x="570" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2ec4b6" text-anchor="middle">🏗️</text>
    <text x="595" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">Theme Clustering</text>
    <text x="555" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan x="555" dy="0">Group related themes into</tspan>
      <tspan x="555" dy="16">higher-level clusters with</tspan>
      <tspan x="555" dy="16">priority-based ranking.</tspan>
    </text>
  </g>

  <!-- ========== ROW 2 ========== -->

  <!-- Card 4: Demographic Crosstabs -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="200" width="230" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="200" width="230" height="4" rx="2" fill="#2ec4b6" opacity="0.8"/>
    <circle cx="60" cy="235" r="16" fill="#2ec4b6" opacity="0.12"/>
    <text x="60" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2ec4b6" text-anchor="middle">📊</text>
    <text x="85" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">Demographic Crosstabs</text>
    <text x="45" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan x="45" dy="0">Cross-tabulate themes by age,</tspan>
      <tspan x="45" dy="16">gender, department, or any</tspan>
      <tspan x="45" dy="16">categorical column.</tspan>
    </text>
  </g>

  <!-- Card 5: Verbatim Highlighting -->
  <g filter="url(#cardShadow)">
    <rect x="285" y="200" width="230" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="285" y="200" width="230" height="4" rx="2" fill="#2ec4b6" opacity="0.8"/>
    <circle cx="315" cy="235" r="16" fill="#2ec4b6" opacity="0.12"/>
    <text x="315" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2ec4b6" text-anchor="middle">📌</text>
    <text x="340" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">Verbatim Highlighting</text>
    <text x="300" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan x="300" dy="0">Surface the most impactful</tspan>
      <tspan x="300" dy="16">survey quotes with theme tags</tspan>
      <tspan x="300" dy="16">and impact scoring.</tspan>
    </text>
  </g>

  <!-- Card 6: Actionable Recommendations -->
  <g filter="url(#cardShadow)">
    <rect x="540" y="200" width="230" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="540" y="200" width="230" height="4" rx="2" fill="#2ec4b6" opacity="0.8"/>
    <circle cx="570" cy="235" r="16" fill="#2ec4b6" opacity="0.12"/>
    <text x="570" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#2ec4b6" text-anchor="middle">💡</text>
    <text x="595" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">Actionable Recommendations</text>
    <text x="555" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan x="555" dy="0">Generate 5-7 prioritized</tspan>
      <tspan x="555" dy="16">recommendations with effort</tspan>
      <tspan x="555" dy="16">and impact assessment.</tspan>
    </text>
  </g>

  <!-- Footer accent -->
  <rect x="0" y="342" width="800" height="8" rx="0" fill="url(#featAccent)" opacity="0.5"/>

  <!-- Border -->
  <rect width="800" height="350" fill="none" stroke="#30363d" stroke-width="1" rx="12" />
</svg>
