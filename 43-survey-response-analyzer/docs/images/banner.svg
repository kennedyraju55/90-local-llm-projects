<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a9e93;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#2ec4b6;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12" />

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="200" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative glow circle -->
  <circle cx="700" cy="100" r="120" fill="url(#glowGrad)" />

  <!-- Clipboard icon -->
  <g transform="translate(60, 55)" opacity="0.9">
    <!-- Clipboard body -->
    <rect x="0" y="15" width="50" height="65" rx="6" fill="none" stroke="#2ec4b6" stroke-width="2.5"/>
    <!-- Clipboard clip -->
    <rect x="14" y="8" width="22" height="14" rx="4" fill="#161b22" stroke="#2ec4b6" stroke-width="2.5"/>
    <!-- Lines on clipboard -->
    <line x1="12" y1="40" x2="38" y2="40" stroke="#2ec4b6" stroke-width="2" opacity="0.6"/>
    <line x1="12" y1="50" x2="34" y2="50" stroke="#2ec4b6" stroke-width="2" opacity="0.6"/>
    <line x1="12" y1="60" x2="30" y2="60" stroke="#2ec4b6" stroke-width="2" opacity="0.6"/>
    <!-- Checkmark -->
    <polyline points="30,55 34,59 42,48" fill="none" stroke="#2ec4b6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Chart bars decorative element (right side) -->
  <g transform="translate(670, 55)" opacity="0.25">
    <rect x="0" y="40" width="12" height="40" rx="2" fill="#2ec4b6"/>
    <rect x="18" y="25" width="12" height="55" rx="2" fill="#2ec4b6"/>
    <rect x="36" y="10" width="12" height="70" rx="2" fill="#2ec4b6"/>
    <rect x="54" y="30" width="12" height="50" rx="2" fill="#2ec4b6"/>
    <rect x="72" y="45" width="12" height="35" rx="2" fill="#2ec4b6"/>
  </g>

  <!-- Accent bar (bottom) -->
  <rect x="0" y="192" width="800" height="8" rx="0" fill="url(#accentGrad)" />

  <!-- Title -->
  <text x="140" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    Survey Response Analyzer
  </text>

  <!-- Tagline -->
  <text x="140" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8b949e">
    AI-Powered Survey Intelligence &amp; Theme Discovery
  </text>

  <!-- Accent dots -->
  <circle cx="140" cy="150" r="3" fill="#2ec4b6" opacity="0.8"/>
  <circle cx="155" cy="150" r="3" fill="#2ec4b6" opacity="0.5"/>
  <circle cx="170" cy="150" r="3" fill="#2ec4b6" opacity="0.3"/>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#30363d" stroke-width="1" rx="12" />
</svg>
