<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="featBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="featAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#7209b7"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2333"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="12" fill="url(#featBg)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">Key Features</text>
  <line x1="330" y1="41" x2="470" y2="41" stroke="url(#featAccent)" stroke-width="2" stroke-linecap="round"/>

  <!-- ROW 1 -->
  <!-- Card 1: KPI Trend Analysis -->
  <g filter="url(#cardShadow)">
    <rect x="25" y="60" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#4361ee" stroke-width="1.2"/>
    <!-- Icon area -->
    <circle cx="60" cy="95" r="18" fill="#4361ee" opacity="0.15"/>
    <text x="60" y="101" text-anchor="middle" fill="#4361ee" font-family="Arial, sans-serif" font-size="20">📈</text>
    <!-- Title -->
    <text x="90" y="93" fill="#e6edf3" font-family="Arial, sans-serif" font-size="13" font-weight="700">KPI Trend Analysis</text>
    <!-- Description -->
    <text x="45" y="120" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Period-over-period comparison with</text>
    <text x="45" y="133" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">automatic ↑ ↓ → trend indicators</text>
    <!-- Mini trend arrows -->
    <g transform="translate(175, 145)">
      <text x="0" y="0" fill="#06d6a0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">↑</text>
      <text x="18" y="0" fill="#ef233c" font-family="Arial, sans-serif" font-size="16" font-weight="bold">↓</text>
      <text x="36" y="0" fill="#f8961e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">→</text>
    </g>
  </g>

  <!-- Card 2: Goal Tracking -->
  <g filter="url(#cardShadow)">
    <rect x="282" y="60" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#06d6a0" stroke-width="1.2"/>
    <circle cx="317" cy="95" r="18" fill="#06d6a0" opacity="0.15"/>
    <text x="317" y="101" text-anchor="middle" fill="#06d6a0" font-family="Arial, sans-serif" font-size="20">🎯</text>
    <text x="347" y="93" fill="#e6edf3" font-family="Arial, sans-serif" font-size="13" font-weight="700">Goal Tracking</text>
    <text x="302" y="120" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Compare actuals vs targets with</text>
    <text x="302" y="133" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">status: achieved · on_track · at_risk · behind</text>
    <!-- Status pills -->
    <g transform="translate(302, 145)">
      <rect x="0" y="0" width="42" height="14" rx="7" fill="#06d6a0" opacity="0.2"/>
      <text x="21" y="10" text-anchor="middle" fill="#06d6a0" font-family="Arial, sans-serif" font-size="7" font-weight="600">achieved</text>
      <rect x="48" y="0" width="42" height="14" rx="7" fill="#4361ee" opacity="0.2"/>
      <text x="69" y="10" text-anchor="middle" fill="#4361ee" font-family="Arial, sans-serif" font-size="7" font-weight="600">on_track</text>
      <rect x="96" y="0" width="38" height="14" rx="7" fill="#f8961e" opacity="0.2"/>
      <text x="115" y="10" text-anchor="middle" fill="#f8961e" font-family="Arial, sans-serif" font-size="7" font-weight="600">at_risk</text>
      <rect x="140" y="0" width="38" height="14" rx="7" fill="#ef233c" opacity="0.2"/>
      <text x="159" y="10" text-anchor="middle" fill="#ef233c" font-family="Arial, sans-serif" font-size="7" font-weight="600">behind</text>
    </g>
  </g>

  <!-- Card 3: Anomaly Detection -->
  <g filter="url(#cardShadow)">
    <rect x="539" y="60" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#f8961e" stroke-width="1.2"/>
    <circle cx="574" cy="95" r="18" fill="#f8961e" opacity="0.15"/>
    <text x="574" y="101" text-anchor="middle" fill="#f8961e" font-family="Arial, sans-serif" font-size="20">⚡</text>
    <text x="604" y="93" fill="#e6edf3" font-family="Arial, sans-serif" font-size="13" font-weight="700">Anomaly Detection</text>
    <text x="559" y="120" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Standard deviation-based detection</text>
    <text x="559" y="133" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">flags values beyond Nσ threshold</text>
    <!-- Mini bell curve -->
    <g transform="translate(620, 140)">
      <path d="M 0,20 Q 15,-5 30,20 Q 45,-5 60,20" fill="none" stroke="#f8961e" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="0" x2="30" y2="20" stroke="#ef233c" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="30" y="-3" text-anchor="middle" fill="#ef233c" font-family="Arial, sans-serif" font-size="8" font-weight="bold">σ</text>
    </g>
  </g>

  <!-- ROW 2 -->
  <!-- Card 4: Alert Generation -->
  <g filter="url(#cardShadow)">
    <rect x="25" y="200" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#ef233c" stroke-width="1.2"/>
    <circle cx="60" cy="235" r="18" fill="#ef233c" opacity="0.15"/>
    <text x="60" y="241" text-anchor="middle" fill="#ef233c" font-family="Arial, sans-serif" font-size="20">🔔</text>
    <text x="90" y="233" fill="#e6edf3" font-family="Arial, sans-serif" font-size="13" font-weight="700">Alert Generation</text>
    <text x="45" y="260" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Automatic alerts for KPIs exceeding</text>
    <text x="45" y="273" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">configurable % change thresholds</text>
    <!-- Alert indicator -->
    <g transform="translate(45, 283)">
      <rect x="0" y="0" width="180" height="18" rx="4" fill="#ef233c" opacity="0.1"/>
      <text x="8" y="13" fill="#ef233c" font-family="Arial, sans-serif" font-size="9">⚠️ revenue ↑ 14.3% — threshold: 10%</text>
    </g>
  </g>

  <!-- Card 5: Moving Average -->
  <g filter="url(#cardShadow)">
    <rect x="282" y="200" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#4cc9f0" stroke-width="1.2"/>
    <circle cx="317" cy="235" r="18" fill="#4cc9f0" opacity="0.15"/>
    <text x="317" y="241" text-anchor="middle" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="20">📊</text>
    <text x="347" y="233" fill="#e6edf3" font-family="Arial, sans-serif" font-size="13" font-weight="700">Moving Average</text>
    <text x="302" y="260" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Sliding-window smoothing with</text>
    <text x="302" y="273" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">configurable window size</text>
    <!-- Mini chart with smoothed line -->
    <g transform="translate(310, 280)">
      <polyline points="0,18 20,10 40,15 60,5 80,12 100,2" fill="none" stroke="#4cc9f0" stroke-width="1" opacity="0.3"/>
      <polyline points="0,16 20,13 40,12 60,10 80,8 100,6" fill="none" stroke="#4cc9f0" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Card 6: Executive Summary -->
  <g filter="url(#cardShadow)">
    <rect x="539" y="200" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="574" cy="235" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="574" y="241" text-anchor="middle" fill="#7209b7" font-family="Arial, sans-serif" font-size="20">🤖</text>
    <text x="604" y="233" fill="#e6edf3" font-family="Arial, sans-serif" font-size="13" font-weight="700">Executive Summary</text>
    <text x="559" y="260" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">LLM-generated narrative reports</text>
    <text x="559" y="273" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">with insights and recommendations</text>
    <!-- Summary lines -->
    <g transform="translate(559, 283)">
      <rect x="0" y="0" width="120" height="3" rx="1.5" fill="#7209b7" opacity="0.3"/>
      <rect x="0" y="7" width="90" height="3" rx="1.5" fill="#7209b7" opacity="0.2"/>
      <rect x="0" y="14" width="105" height="3" rx="1.5" fill="#7209b7" opacity="0.15"/>
    </g>
  </g>
</svg>
