<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2333"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#7209b7"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4361ee"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06d6a0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#archBg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.5">System Architecture</text>
  <line x1="300" y1="44" x2="500" y2="44" stroke="url(#accentLine)" stroke-width="2" stroke-linecap="round"/>

  <!-- ROW 1: Input + Detection + Trend Engine -->
  <!-- Box 1: KPI CSV Input -->
  <g filter="url(#dropShadow)">
    <rect x="30" y="70" width="120" height="60" rx="8" fill="url(#boxGrad)" stroke="#4361ee" stroke-width="1.5"/>
    <text x="90" y="94" text-anchor="middle" fill="#4361ee" font-family="Arial, sans-serif" font-size="18">📄</text>
    <text x="90" y="114" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">KPI CSV</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="100" x2="185" y2="100" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Box 2: Period Detection -->
  <g filter="url(#dropShadow)">
    <rect x="190" y="70" width="130" height="60" rx="8" fill="url(#boxGrad)" stroke="#4361ee" stroke-width="1.5"/>
    <text x="255" y="94" text-anchor="middle" fill="#4361ee" font-family="Arial, sans-serif" font-size="18">🔍</text>
    <text x="255" y="114" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Period Detection</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="320" y1="100" x2="355" y2="100" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Box 3: Trend Engine -->
  <g filter="url(#dropShadow)">
    <rect x="360" y="70" width="130" height="60" rx="8" fill="url(#boxGrad)" stroke="#4361ee" stroke-width="1.5"/>
    <text x="425" y="94" text-anchor="middle" fill="#4361ee" font-family="Arial, sans-serif" font-size="18">📈</text>
    <text x="425" y="114" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Trend Engine</text>
  </g>

  <!-- Arrow 3 splits down to 4, 5, 6 -->
  <!-- Main line down from Trend Engine -->
  <line x1="425" y1="130" x2="425" y2="165" stroke="#4361ee" stroke-width="2"/>

  <!-- Horizontal spread line -->
  <line x1="120" y1="165" x2="680" y2="165" stroke="#4361ee" stroke-width="2"/>

  <!-- Vertical drops to Row 2 boxes -->
  <line x1="120" y1="165" x2="120" y2="190" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>
  <line x1="310" y1="165" x2="310" y2="190" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>
  <line x1="500" y1="165" x2="500" y2="190" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>
  <line x1="680" y1="165" x2="680" y2="190" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- ROW 2: Goal Tracker, Anomaly Detector, Moving Average, Alert Generator -->
  <!-- Box 4: Goal Tracker -->
  <g filter="url(#dropShadow)">
    <rect x="50" y="195" width="140" height="60" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5"/>
    <text x="120" y="219" text-anchor="middle" fill="#06d6a0" font-family="Arial, sans-serif" font-size="18">🎯</text>
    <text x="120" y="239" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Goal Tracker</text>
  </g>

  <!-- Box 5: Anomaly Detector -->
  <g filter="url(#dropShadow)">
    <rect x="240" y="195" width="140" height="60" rx="8" fill="url(#boxGrad)" stroke="#f8961e" stroke-width="1.5"/>
    <text x="310" y="219" text-anchor="middle" fill="#f8961e" font-family="Arial, sans-serif" font-size="18">⚡</text>
    <text x="310" y="239" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Anomaly Detector</text>
  </g>

  <!-- Box 6: Moving Average -->
  <g filter="url(#dropShadow)">
    <rect x="430" y="195" width="140" height="60" rx="8" fill="url(#boxGrad)" stroke="#4cc9f0" stroke-width="1.5"/>
    <text x="500" y="219" text-anchor="middle" fill="#4cc9f0" font-family="Arial, sans-serif" font-size="18">📊</text>
    <text x="500" y="239" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Moving Average</text>
  </g>

  <!-- Box 7: Alert Generator -->
  <g filter="url(#dropShadow)">
    <rect x="610" y="195" width="140" height="60" rx="8" fill="url(#boxGrad)" stroke="#ef233c" stroke-width="1.5"/>
    <text x="680" y="219" text-anchor="middle" fill="#ef233c" font-family="Arial, sans-serif" font-size="18">🔔</text>
    <text x="680" y="239" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Alert Generator</text>
  </g>

  <!-- Converge arrows down to LLM Report -->
  <line x1="120" y1="255" x2="120" y2="280" stroke="#06d6a0" stroke-width="2"/>
  <line x1="310" y1="255" x2="310" y2="280" stroke="#f8961e" stroke-width="2"/>
  <line x1="500" y1="255" x2="500" y2="280" stroke="#4cc9f0" stroke-width="2"/>
  <line x1="680" y1="255" x2="680" y2="280" stroke="#ef233c" stroke-width="2"/>

  <!-- Horizontal converge line -->
  <line x1="120" y1="280" x2="680" y2="280" stroke="#4361ee" stroke-width="2"/>
  <line x1="400" y1="280" x2="400" y2="305" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- ROW 3: LLM Report Generation -->
  <!-- Box 8: LLM Report -->
  <g filter="url(#dropShadow)">
    <rect x="305" y="310" width="190" height="60" rx="8" fill="url(#boxGrad)" stroke="#4361ee" stroke-width="2"/>
    <text x="400" y="334" text-anchor="middle" fill="#4361ee" font-family="Arial, sans-serif" font-size="18">🤖</text>
    <text x="400" y="354" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="12" font-weight="700">LLM Report Engine</text>
  </g>

  <!-- Arrow to Executive Summary (left) -->
  <line x1="305" y1="340" x2="205" y2="340" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowHeadGreen)"/>

  <!-- Box 9: Executive Summary -->
  <g filter="url(#dropShadow)">
    <rect x="65" y="310" width="140" height="60" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5"/>
    <text x="135" y="334" text-anchor="middle" fill="#06d6a0" font-family="Arial, sans-serif" font-size="18">📋</text>
    <text x="135" y="354" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">Executive Summary</text>
  </g>

  <!-- Arrow to Web UI / CLI (right) -->
  <line x1="495" y1="340" x2="575" y2="340" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowHeadGreen)"/>

  <!-- Box 10: Output (CLI + Web UI) -->
  <g filter="url(#dropShadow)">
    <rect x="580" y="310" width="160" height="60" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5"/>
    <text x="660" y="334" text-anchor="middle" fill="#06d6a0" font-family="Arial, sans-serif" font-size="18">💻</text>
    <text x="660" y="354" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="11" font-weight="600">CLI + Web Dashboard</text>
  </g>

  <!-- Config badge -->
  <g transform="translate(560, 75)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="url(#boxGrad)" stroke="#21262d" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="55" y="22" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="14">⚙️</text>
    <text x="55" y="39" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="600">config.yaml</text>
  </g>
  <!-- Dashed line from config to Trend Engine -->
  <line x1="560" y1="100" x2="490" y2="100" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <g transform="translate(15, 385)">
    <text x="0" y="0" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">
      Data Flow ━━  |  Config ╌╌╌  |  🔵 Core  🟢 Output  🟠 Detection  🔴 Alerts  🔵 Smoothing
    </text>
  </g>
</svg>
