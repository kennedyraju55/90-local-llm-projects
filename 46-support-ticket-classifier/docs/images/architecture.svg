<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151d28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04a67c;stop-opacity:1" />
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="glowArrow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06d6a0" />
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="3.5" refY="7" orient="auto">
      <polygon points="0 0, 7 0, 3.5 7" fill="#06d6a0" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bgGrad)" />
  <rect x="1" y="1" width="798" height="398" rx="12" fill="none" stroke="#06d6a0" stroke-opacity="0.15" stroke-width="1" />

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#06d6a0">Architecture Flow</text>

  <!-- ROW 1: Input Stage -->
  <!-- Box 1: Ticket CSV -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="55" width="130" height="60" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="95" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">📄</text>
    <text x="95" y="98" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Ticket CSV</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="85" x2="195" y2="85" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glowArrow)" />

  <!-- Box 2: Text Detection -->
  <g filter="url(#boxShadow)">
    <rect x="200" y="55" width="130" height="60" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="265" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">🔍</text>
    <text x="265" y="98" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Text Detection</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="85" x2="365" y2="85" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glowArrow)" />

  <!-- Box 3: LLM Classifier -->
  <g filter="url(#boxShadow)">
    <rect x="370" y="50" width="160" height="70" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="2" />
    <text x="450" y="75" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#06d6a0">🤖</text>
    <text x="450" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">LLM Classifier</text>
    <text x="450" y="110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">Ollama / Gemma</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="530" y1="85" x2="565" y2="85" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glowArrow)" />

  <!-- Box 4: Classification Result -->
  <g filter="url(#boxShadow)">
    <rect x="570" y="55" width="130" height="60" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="635" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">🏷️</text>
    <text x="635" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e6edf3">Classification</text>
    <text x="635" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">cat / pri / conf</text>
  </g>

  <!-- Down arrow from Classification to Row 2 center -->
  <line x1="635" y1="115" x2="635" y2="155" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowDown)" filter="url(#glowArrow)" />

  <!-- Horizontal connector across Row 2 -->
  <line x1="165" y1="195" x2="635" y2="195" stroke="#06d6a0" stroke-width="1" stroke-dasharray="4,3" opacity="0.3" />

  <!-- ROW 2: Processing Stage -->
  <!-- Box 5: Priority Queue -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="160" width="140" height="65" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="100" y="183" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">🚨</text>
    <text x="100" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Priority Queue</text>
    <text x="100" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">Weighted Sorting</text>
  </g>

  <!-- Box 6: SLA Engine -->
  <g filter="url(#boxShadow)">
    <rect x="220" y="160" width="140" height="65" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="290" y="183" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">⏱️</text>
    <text x="290" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">SLA Engine</text>
    <text x="290" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">Deadline Tracking</text>
  </g>

  <!-- Box 7: Team Router -->
  <g filter="url(#boxShadow)">
    <rect x="410" y="160" width="140" height="65" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="480" y="183" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">🏢</text>
    <text x="480" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Team Router</text>
    <text x="480" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">Category → Team</text>
  </g>

  <!-- Box 8: Auto-Response -->
  <g filter="url(#boxShadow)">
    <rect x="600" y="160" width="140" height="65" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1.5" />
    <text x="670" y="183" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#06d6a0">💬</text>
    <text x="670" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Auto-Response</text>
    <text x="670" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">Customer Replies</text>
  </g>

  <!-- Down arrows from Row 2 to Row 3 -->
  <line x1="100" y1="225" x2="100" y2="265" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowDown)" filter="url(#glowArrow)" />
  <line x1="290" y1="225" x2="290" y2="265" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowDown)" filter="url(#glowArrow)" />
  <line x1="480" y1="225" x2="480" y2="265" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowDown)" filter="url(#glowArrow)" />
  <line x1="670" y1="225" x2="670" y2="265" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowDown)" filter="url(#glowArrow)" />

  <!-- ROW 3: Analytics Dashboard (single wide box) -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="270" width="740" height="70" rx="8" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="2" />
    <text x="400" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#06d6a0">📊</text>
    <text x="400" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#e6edf3">Analytics Dashboard</text>
    <text x="400" y="332" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Category Distribution  •  Priority Metrics  •  Confidence Scores  •  SLA Compliance</text>
  </g>

  <!-- ROW 4: Output interfaces -->
  <line x1="260" y1="340" x2="260" y2="360" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowDown)" opacity="0.6" />
  <line x1="540" y1="340" x2="540" y2="360" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowDown)" opacity="0.6" />

  <g>
    <rect x="190" y="363" width="135" height="30" rx="6" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1" stroke-opacity="0.5" />
    <text x="257" y="383" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">🖥️ CLI (Click)</text>
  </g>
  <g>
    <rect x="475" y="363" width="135" height="30" rx="6" fill="url(#boxGrad)" stroke="#06d6a0" stroke-width="1" stroke-opacity="0.5" />
    <text x="542" y="383" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">🌐 Web (Streamlit)</text>
  </g>
</svg>
