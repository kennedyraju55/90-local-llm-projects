<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04a67c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#06d6a0" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)" />

  <!-- Border accent -->
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="#06d6a0" stroke-opacity="0.2" stroke-width="1" />

  <!-- Decorative ticket shapes (left) -->
  <g opacity="0.12">
    <rect x="30" y="35" width="65" height="45" rx="6" fill="#06d6a0" />
    <line x1="38" y1="48" x2="80" y2="48" stroke="#0d1117" stroke-width="2" />
    <line x1="38" y1="56" x2="72" y2="56" stroke="#0d1117" stroke-width="2" />
    <line x1="38" y1="64" x2="60" y2="64" stroke="#0d1117" stroke-width="2" />
  </g>
  <g opacity="0.08" transform="translate(15, 110)">
    <rect x="0" y="0" width="55" height="38" rx="5" fill="#06d6a0" />
    <line x1="8" y1="12" x2="40" y2="12" stroke="#0d1117" stroke-width="2" />
    <line x1="8" y1="20" x2="35" y2="20" stroke="#0d1117" stroke-width="2" />
  </g>

  <!-- Decorative ticket shapes (right) -->
  <g opacity="0.12" transform="translate(700, 30)">
    <rect x="0" y="0" width="60" height="42" rx="6" fill="#06d6a0" />
    <circle cx="12" cy="14" r="4" fill="#0d1117" />
    <line x1="22" y1="12" x2="50" y2="12" stroke="#0d1117" stroke-width="2" />
    <line x1="22" y1="20" x2="45" y2="20" stroke="#0d1117" stroke-width="2" />
    <line x1="8" y1="30" x2="52" y2="30" stroke="#0d1117" stroke-width="2" />
  </g>
  <g opacity="0.08" transform="translate(720, 120)">
    <rect x="0" y="0" width="50" height="35" rx="5" fill="#06d6a0" />
    <line x1="8" y1="10" x2="38" y2="10" stroke="#0d1117" stroke-width="2" />
    <line x1="8" y1="18" x2="32" y2="18" stroke="#0d1117" stroke-width="2" />
  </g>

  <!-- Decorative dots pattern -->
  <g opacity="0.06" fill="#06d6a0">
    <circle cx="140" cy="170" r="2" />
    <circle cx="155" cy="170" r="2" />
    <circle cx="170" cy="170" r="2" />
    <circle cx="140" cy="185" r="2" />
    <circle cx="155" cy="185" r="2" />
    <circle cx="170" cy="185" r="2" />
    <circle cx="630" cy="170" r="2" />
    <circle cx="645" cy="170" r="2" />
    <circle cx="660" cy="170" r="2" />
    <circle cx="630" cy="185" r="2" />
    <circle cx="645" cy="185" r="2" />
    <circle cx="660" cy="185" r="2" />
  </g>

  <!-- Accent line -->
  <rect x="300" y="88" width="200" height="3" rx="1.5" fill="url(#accentGrad)" filter="url(#glow)" />

  <!-- Title -->
  <text x="400" y="75" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" filter="url(#shadow)">
    🎫 Support Ticket Classifier
  </text>

  <!-- Tagline -->
  <text x="400" y="120" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8b949e">
    AI-Powered Ticket Triage &amp; SLA Management
  </text>

  <!-- Bottom accent bar -->
  <rect x="250" y="145" width="300" height="2" rx="1" fill="#06d6a0" opacity="0.4" />

  <!-- Bottom badges -->
  <g transform="translate(260, 158)">
    <rect x="0" y="0" width="70" height="20" rx="10" fill="#06d6a0" opacity="0.15" />
    <text x="35" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#06d6a0">Local LLM</text>
  </g>
  <g transform="translate(340, 158)">
    <rect x="0" y="0" width="55" height="20" rx="10" fill="#06d6a0" opacity="0.15" />
    <text x="27" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#06d6a0">CLI</text>
  </g>
  <g transform="translate(405, 158)">
    <rect x="0" y="0" width="70" height="20" rx="10" fill="#06d6a0" opacity="0.15" />
    <text x="35" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#06d6a0">Web UI</text>
  </g>
  <g transform="translate(485, 158)">
    <rect x="0" y="0" width="55" height="20" rx="10" fill="#06d6a0" opacity="0.15" />
    <text x="27" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#06d6a0">SLA</text>
  </g>
</svg>
