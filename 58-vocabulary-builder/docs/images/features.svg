<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#a8201a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="340" width="800" height="10" fill="url(#accent)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e63946" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">FEATURES AT A GLANCE</text>

  <!-- Row 1, Col 1: Rich Word Metadata -->
  <rect x="30" y="60" width="235" height="120" rx="10" fill="#2a2a4a" stroke="#e63946" stroke-width="2" filter="url(#shadow)"/>
  <text x="147" y="90" text-anchor="middle" fill="#e63946" font-family="Segoe UI,Arial,sans-serif" font-size="24">🏛️</text>
  <text x="147" y="115" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Rich Word Metadata</text>
  <text x="147" y="135" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Etymology • Mnemonics</text>
  <text x="147" y="150" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Word Families • Definitions</text>
  <text x="147" y="165" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Part of Speech • Difficulty</text>

  <!-- Row 1, Col 2: SM-2 Spaced Repetition -->
  <rect x="283" y="60" width="235" height="120" rx="10" fill="#2a2a4a" stroke="#e9c46a" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="90" text-anchor="middle" fill="#e9c46a" font-family="Segoe UI,Arial,sans-serif" font-size="24">🧠</text>
  <text x="400" y="115" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">SM-2 Spaced Repetition</text>
  <text x="400" y="135" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Adaptive Review Intervals</text>
  <text x="400" y="150" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Ease Factor Adjustment</text>
  <text x="400" y="165" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Due Card Tracking</text>

  <!-- Row 1, Col 3: Interactive Quiz -->
  <rect x="536" y="60" width="235" height="120" rx="10" fill="#2a2a4a" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow)"/>
  <text x="653" y="90" text-anchor="middle" fill="#2a9d8f" font-family="Segoe UI,Arial,sans-serif" font-size="24">🎯</text>
  <text x="653" y="115" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Interactive Vocabulary Quiz</text>
  <text x="653" y="135" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Definition-Based Testing</text>
  <text x="653" y="150" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Instant Scoring &amp; Feedback</text>
  <text x="653" y="165" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Mnemonic Hints on Incorrect</text>

  <!-- Row 2, Col 1: Context Sentences -->
  <rect x="30" y="200" width="235" height="120" rx="10" fill="#2a2a4a" stroke="#457b9d" stroke-width="2" filter="url(#shadow)"/>
  <text x="147" y="230" text-anchor="middle" fill="#457b9d" font-family="Segoe UI,Arial,sans-serif" font-size="24">📝</text>
  <text x="147" y="255" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Context Sentences</text>
  <text x="147" y="275" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Multiple Usage Examples</text>
  <text x="147" y="290" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Real-World Applications</text>
  <text x="147" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">LLM-Generated Contexts</text>

  <!-- Row 2, Col 2: Synonyms & Antonyms -->
  <rect x="283" y="200" width="235" height="120" rx="10" fill="#2a2a4a" stroke="#e76f51" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="230" text-anchor="middle" fill="#e76f51" font-family="Segoe UI,Arial,sans-serif" font-size="24">🔄</text>
  <text x="400" y="255" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Synonyms &amp; Antonyms</text>
  <text x="400" y="275" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Related Word Discovery</text>
  <text x="400" y="290" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Vocabulary Network Building</text>
  <text x="400" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Semantic Relationships</text>

  <!-- Row 2, Col 3: Progress Tracking -->
  <rect x="536" y="200" width="235" height="120" rx="10" fill="#2a2a4a" stroke="#83c5be" stroke-width="2" filter="url(#shadow)"/>
  <text x="653" y="230" text-anchor="middle" fill="#83c5be" font-family="Segoe UI,Arial,sans-serif" font-size="24">📊</text>
  <text x="653" y="255" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Progress Tracking &amp; Stats</text>
  <text x="653" y="275" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Mastery Percentage</text>
  <text x="653" y="290" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Quiz Score History</text>
  <text x="653" y="305" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Learning Streaks</text>
</svg>
