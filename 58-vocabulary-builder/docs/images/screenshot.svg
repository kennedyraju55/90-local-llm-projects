    <text x="20" y="125" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">Here are the definitions and example sentences for the three words:</text>
    <text x="20" y="143" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12"></text>
    <text x="20" y="161" fill="#ff79c6" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">**Ephemeral**</text>
    <text x="20" y="179" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">* **Definition:** Lasting for a very short time.</text>
    <text x="20" y="197" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">* **Example Sentence:** The beauty of the blooming cherry blossoms is wonderfully</text>
    <text x="20" y="215" fill="#ff79c6" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">**ephemeral**, lasting only a week or two.</text>
    <text x="20" y="233" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12"></text>
    <text x="20" y="251" fill="#ff79c6" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">**Ubiquitous**</text>
    <text x="20" y="269" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">* **Definition:** Present, appearing, or found everywhere.</text>
    <text x="20" y="287" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">* **Example Sentence:** In the modern era, smartphones have become **ubiquitous**,</text>
    <text x="20" y="305" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">present in almost every person&#x27;s pocket.</text>
    <text x="20" y="323" fill="#f8f8f2" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12"></text>
    <text x="20" y="341" fill="#ff79c6" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">**Pragmatic**</text>
    <text x="20" y="359" fill="#f1fa8c" font-family="'Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="12">* **Definition:** Dealing with things sensibly and realistically in a way that is</text>
